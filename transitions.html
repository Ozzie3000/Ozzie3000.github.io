<!DOCTYPE html>
<html lang="en">
<head>
<title>HTML5 | Transitions</title>
<meta charset="utf-8">
<meta name="description" content="HTML5 demos" />
<style type="text/css">
	body{ 
		background-color: #eeeeee;
		/* local */
		/*background: url("..//pictures/background-wallpapers-60.png"); */
		/* not local */
		background: url("images/night_sky.jpg");
		background-attachment: fixed;
		background-size: cover;
		background-repeat: no-repeat;
		background-position: center center;
		/*color: white;  */
		font-size: 18px;
	}
	h1{ color: white; font-family: sans-serif; text-align: center; font-size: 24px;}
	#p_box{
		text-align: center;
	}
	div.box{
		width: 420px;
		height: 30px;
		background-color: black;
		-webkit-transition-property: background-color;
		-webkit-transition-duration: 5s;
		-webkit-transition-timing-function: ease-in;
		-webkit-transition-delay: 2s;
		transition-property: background-color;
		transition-duration: 5s;
		transition-timing-function: ease-in;
		transition-delay: 2s;
	}
	div.box:active{
		background-color: blue;
	}
	.pic_frame{
		display: table;
		margin: 0 auto;
		border: 50px solid brown;
		width: 495px;
		height: 560px;
		-webkit-border-image: url("https://0.s3.envato.com/files/82227275/GR_fishbone_pattern_THUMB.jpg") 30 30 stretch;
		-moz-border-image: url("https://0.s3.envato.com/files/82227275/GR_fishbone_pattern_THUMB.jpg") 30 30 stretch;
		-o-border-image: url("https://0.s3.envato.com/files/82227275/GR_fishbone_pattern_THUMB.jpg") 30 30 stretch;
		border-image: url("https://0.s3.envato.com/files/82227275/GR_fishbone_pattern_THUMB.jpg") 30 30 stretch;
	}
	figure{
		padding: 0px;
		opacity: 0;
		-webkit-transition: opacity 3s;
		-moz-transition: opacity 3s;
		-o-transition: opacity 3s;
		transition: opacity 3s;
	}
	figure:hover{
		opacity: 1;
	}
	#thank{
		color: white;
	}
	.ending{
		color: white; 
		font-family: sans-serif; 
		font-size: 16px; 
		text-align: center; 
	}
</style>
<script type="text/javascript">
	function actionMessage(){
		document.getElementById("thank").innerHTML="Thank you for hovering!";
	}
	function setHandlers(){
		// the standard event name is all-lowercase "transitionend"
		document.getElementById("transit").addEventListener("transitionend", actionMessage, false);
	}
	window.onload = function(){setHandlers();};
</script>
</head>
<body>
	<input type="button" value="Refreshness" onclick="location.reload()" />
	<br /><br />
	<h1>Be specific with transitions</h1>
	
	<div class="box">
		<p id="p_box">Hover inside the frame to see something else</p>
	</div>

	<p id="thank">Click and hold the black box for 5 seconds to receive directions.</p>
	<div class="pic_frame">
		<figure id="transit">
			<img src="images/wolf.jpg" alt="A wolf" width="500" height="500">
			<figcaption>This is a picture</figcaption>
		</figure>
	</div>

	<br /><br /><br /><br />
	<footer class="ending">Ozzie3000. <br />CSS transitions with a little Javascript to detect when they finish.<br /> <a href="index.html">Back to Home page</a></footer>

<script type="text/javascript">
</script>
</body>
</html>
