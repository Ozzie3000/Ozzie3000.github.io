<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background-color: #333;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .cell {
            background-color: #fff;
            border-radius: 5px;
            font-size: 3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .cell:hover {
            background-color: #e0e0e0;
        }
        .cell.taken {
            cursor: not-allowed;
        }
        .info {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #555;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Tic Tac Toe</h1>
    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)" id="cell-0"></div>
        <div class="cell" onclick="makeMove(1)" id="cell-1"></div>
        <div class="cell" onclick="makeMove(2)" id="cell-2"></div>
        <div class="cell" onclick="makeMove(3)" id="cell-3"></div>
        <div class="cell" onclick="makeMove(4)" id="cell-4"></div>
        <div class="cell" onclick="makeMove(5)" id="cell-5"></div>
        <div class="cell" onclick="makeMove(6)" id="cell-6"></div>
        <div class="cell" onclick="makeMove(7)" id="cell-7"></div>
        <div class="cell" onclick="makeMove(8)" id="cell-8"></div>
    </div>

    <div class="info" id="status">Player X's Turn</div>
    <button onclick="resetGame()">Restart Game</button>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;

        const winningConditions = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        function makeMove(index) {
            if (board[index] === "" && gameActive) {
                board[index] = currentPlayer;
                document.getElementById(`cell-${index}`).innerText = currentPlayer;
                document.getElementById(`cell-${index}`).classList.add('taken');
                
                checkResult();
                changePlayer();
            }
        }

        function changePlayer() {
            if (gameActive) {
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                document.getElementById("status").innerText = `Player ${currentPlayer}'s Turn`;
            }
        }

        function checkResult() {
            let roundWon = false;
            for (let i = 0; i <= 7; i++) {
                const winCondition = winningConditions[i];
                let a = board[winCondition[0]];
                let b = board[winCondition[1]];
                let c = board[winCondition[2]];
                if (a === '' || b === '' || c === '') {
                    continue;
                }
                if (a === b && b === c) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                document.getElementById("status").innerText = `Player ${currentPlayer} Wins!`;
                gameActive = false;
                return;
            }

            let roundDraw = !board.includes("");
            if (roundDraw) {
                document.getElementById("status").innerText = "Draw!";
                gameActive = false;
                return;
            }
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            currentPlayer = "X";
            document.getElementById("status").innerText = "Player X's Turn";
            document.querySelectorAll('.cell').forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('taken');
            });
        }
    </script>
</body>
</html>
