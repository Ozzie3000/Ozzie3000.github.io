<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where Oz MOPs meets Connect Four: Human vs AI</title>
    <style>
        :root {
            --board-blue: #1e40af;
            --empty-square: #111827;
            --player-red: #dc2626;
            --ai-yellow: #eab308;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        h1 { margin-bottom: 5px; font-weight: 400; }
        #controls {
            margin-bottom: 22.5px;
            background: #2a2a2a;
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #scoreboard {
            display: flex;
            gap: 30px;
            background: #1c1c1c;
            padding: 8px 24px;
            border-radius: 20px;
            border: 1px solid #444;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .score-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .score-red { color: var(--player-red); }
        .score-yellow { color: var(--ai-yellow); }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #status {
            font-size: 1.2rem;
            font-weight: bold;
            height: 25px;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(7, 90px);
            grid-template-rows: repeat(6, 90px);
            background-color: var(--board-blue);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.6);
            gap: 8px;
            position: relative;
        }
        .cell {
            width: 90px;
            height: 90px;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        .cell::before {
            content: '';
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background-color: var(--empty-square);
            position: absolute;
            z-index: 2;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .token {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            position: absolute;
            z-index: 3;
            transition: top 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045);
            box-shadow: inset 0 -6px 12px rgba(0,0,0,0.3), 0 4px 6px rgba(0,0,0,0.4);
        }
        .token.player { background-color: var(--player-red); }
        .token.ai { background-color: var(--ai-yellow); }
        .token.winning-token {
            animation: pulse-cyan 1.5s infinite;
            z-index: 4;
            box-shadow: 0 0 20px #00ffff, inset 0 0 10px rgba(255,255,255,0.6);
            border: 3px solid #00ffff;
        }
        @keyframes pulse-cyan {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        button {
            padding: 8px 16px;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #555; }
    </style>
</head>
<body>

    <h1>Can you beat Oz's Ai at Connect Four on Level 10?</h1>
    
    <div id="controls">
        <div class="slider-container">
            <label for="difficulty">AI Difficulty (0-10):</label>
            <input type="range" id="difficulty" min="0" max="10" value="5">
            <span id="diff-val">5</span>
        </div>
        <div id="scoreboard">
            <div class="score-box">Player (Red): <span id="player-score" class="score-red">0</span></div>
            <div class="score-box">AI (Yellow): <span id="ai-score" class="score-yellow">0</span></div>
        </div>
        <div id="status">Your Turn (Red)</div>
        <div style="display: flex; gap: 40px;">
            <button onclick="nextRound()" id="next-btn" style="background-color: #2563eb;">Let's Go! Next Round</button>
            <button onclick="resetFullGame()">Reset Match & Scores</button>
        </div>
    </div>

    <div id="board"></div>

    <script>
        const EMPTY = 0;
        const PLAYER = 1;
        const AI = 2;

        const ROWS = 6;
        const COLS = 7;

        let board = [];
        let turn = PLAYER;
        let isAnimating = false;
        let gameOver = false;
        let playerScore = 0;
        let aiScore = 0;

        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const diffSlider = document.getElementById('difficulty');
        const diffValEl = document.getElementById('diff-val');

        diffSlider.addEventListener('input', (e) => {
            diffValEl.textContent = e.target.value;
        });

        function initBoard() {
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(EMPTY));
            gameOver = false;
            turn = PLAYER;
            isAnimating = false;
        }

        function createGridLayout() {
            boardEl.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.col = c;
                    cell.onclick = () => handleColumnClick(c);
                    boardEl.appendChild(cell);
                }
            }
        }

        function handleColumnClick(c) {
            if (turn !== PLAYER || isAnimating || gameOver) return;

            const r = getNextAvailableRow(board, c);
            if (r === -1) {
                statusEl.textContent = "Column full! Pick another.";
                return;
            }

            dropToken(r, c, PLAYER);
        }

        function getNextAvailableRow(b, c) {
            for (let r = ROWS - 1; r >= 0; r--) {
                if (b[r][c] === EMPTY) return r;
            }
            return -1;
        }

        function dropToken(r, c, activePlayer) {
            isAnimating = true;
            board[r][c] = activePlayer;

            const token = document.createElement('div');
            token.classList.add('token', activePlayer === PLAYER ? 'player' : 'ai');
            token.id = `token-${r}-${c}`;
            
            const startTop = -80; 
            const targetTop = 19 + r * 98;
            const leftPosition = 19 + c * 98;

            token.style.left = `${leftPosition}px`;
            token.style.top = `${startTop}px`;
            boardEl.appendChild(token);

            setTimeout(() => {
                token.style.top = `${targetTop}px`;
            }, 15);

            setTimeout(() => {
                isAnimating = false;
                const winData = checkWin(board);
                
                if (winData) {
                    highlightWinningLine(winData.slots);
                    if (activePlayer === PLAYER) {
                        playerScore++;
                        document.getElementById('player-score').textContent = playerScore;
                        statusEl.textContent = "You Win!";
                    } else {
                        aiScore++;
                        document.getElementById('ai-score').textContent = aiScore;
                        statusEl.textContent = "AI Wins!";
                    }
                    gameOver = true;
                    return;
                }

                if (checkDraw(board)) {
                    statusEl.textContent = "It's a Draw!";
                    gameOver = true;
                    return;
                }

                if (activePlayer === PLAYER) {
                    turn = AI;
                    statusEl.textContent = "AI is thinking...";
                    setTimeout(handleAiTurn, 400);
                } else {
                    turn = PLAYER;
                    statusEl.textContent = "Your Turn (Red)";
                }
            }, 415);
        }

        function handleAiTurn() {
            if (gameOver || isAnimating) return;

            const validCols = [];
            for (let c = 0; c < COLS; c++) {
                if (getNextAvailableRow(board, c) !== -1) validCols.push(c);
            }

            if (validCols.length === 0) return;

            const level = parseInt(diffSlider.value);
            const randomThreshold = (10 - level) / 10;

            let chosenCol;
            if (Math.random() < randomThreshold) {
                chosenCol = validCols[Math.floor(Math.random() * validCols.length)];
            } else {
                chosenCol = getBestAiColumn(board);
            }

            const r = getNextAvailableRow(board, chosenCol);
            dropToken(r, chosenCol, AI);
        }

        function getBestAiColumn(currentBoard) {
            let bestScore = -Infinity;
            let bestCols = [];
            const depth = 4; 

            for (let c = 0; c < COLS; c++) {
                const r = getNextAvailableRow(currentBoard, c);
                if (r !== -1) {
                    currentBoard[r][c] = AI;
                    let score = minimax(currentBoard, depth - 1, -Infinity, Infinity, false);
                    currentBoard[r][c] = EMPTY;

                    if (score > bestScore) {
                        bestScore = score;
                        bestCols = [c];
                    } else if (score === bestScore) {
                        bestCols.push(c);
                    }
                }
            }
            return bestCols[Math.floor(Math.random() * bestCols.length)];
        }

        function minimax(b, depth, alpha, beta, isMaximizing) {
            const winData = checkWin(b);
            if (winData) return winData.player === AI ? 100000 + depth : -100000 - depth;
            if (checkDraw(b)) return 0;
            if (depth === 0) return evaluateBoardHeuristics(b);

            if (isMaximizing) {
                let maxEval = -Infinity;
                for (let c = 0; c < COLS; c++) {
                    const r = getNextAvailableRow(b, c);
                    if (r !== -1) {
                        b[r][c] = AI;
                        let ev = minimax(b, depth - 1, alpha, beta, false);
                        b[r][c] = EMPTY;
                        maxEval = Math.max(maxEval, ev);
                        alpha = Math.max(alpha, ev);
                        if (beta <= alpha) break;
                    }
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (let c = 0; c < COLS; c++) {
                    const r = getNextAvailableRow(b, c);
                    if (r !== -1) {
                        b[r][c] = PLAYER;
                        let ev = minimax(b, depth - 1, alpha, beta, true);
                        b[r][c] = EMPTY;
                        minEval = Math.min(minEval, ev);
                        beta = Math.min(beta, ev);
                        if (beta <= alpha) break;
                    }
                }
                return minEval;
            }
        }

        function evaluateBoardHeuristics(b) {
            let score = 0;
            const centerCol = 3;
            for (let r = 0; r < ROWS; r++) {
                if (b[r][centerCol] === AI) score += 4;
                else if (b[r][centerCol] === PLAYER) score -= 4;
            }
            score += countWindowScores(b, AI) - countWindowScores(b, PLAYER);
            return score;
        }

        function countWindowScores(b, pSide) {
            let score = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS - 3; c++) {
                    score += evaluateWindow([b[r][c], b[r][c+1], b[r][c+2], b[r][c+3]], pSide);
                }
            }
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS - 3; r++) {
                    score += evaluateWindow([b[r][c], b[r+1][c], b[r+2][c], b[r+3][c]], pSide);
                }
            }
            for (let r = 3; r < ROWS; r++) {
                for (let c = 0; c < COLS - 3; c++) {
                    score += evaluateWindow([b[r][c], b[r-1][c+1], b[r-2][c+2], b[r-3][c+3]], pSide);
                }
            }
            for (let r = 0; r < ROWS - 3; r++) {
                for (let c = 0; c < COLS - 3; c++) {
                    score += evaluateWindow([b[r][c], b[r+1][c+1], b[r+2][c+2], b[r+3][c+3]], pSide);
                }
            }
            return score;
        }

        function evaluateWindow(window, pSide) {
            let matchCount = 0;
            let blankCount = 0;
            for (let cell of window) {
                if (cell === pSide) matchCount++;
                else if (cell === EMPTY) blankCount++;
            }
            if (matchCount === 4) return 1000;
            if (matchCount === 3 && blankCount === 1) return 15;
            if (matchCount === 2 && blankCount === 2) return 4;
            return 0;
        }

        function checkWin(b) {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS - 3; c++) {
                    if (b[r][c] !== EMPTY && b[r][c] === b[r][c+1] && b[r][c] === b[r][c+2] && b[r][c] === b[r][c+3]) {
                        return { player: b[r][c], slots: [[r,c], [r,c+1], [r,c+2], [r,c+3]] };
                    }
                }
            }
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS - 3; r++) {
                    if (b[r][c] !== EMPTY && b[r][c] === b[r+1][c] && b[r][c] === b[r+2][c] && b[r][c] === b[r+3][c]) {
                        return { player: b[r][c], slots: [[r,c], [r+1,c], [r+2,c], [r+3,c]] };
                    }
                }
            }
            for (let r = 3; r < ROWS; r++) {
                for (let c = 0; c < COLS - 3; c++) {
                    if (b[r][c] !== EMPTY && b[r][c] === b[r-1][c+1] && b[r][c] === b[r-2][c+2] && b[r][c] === b[r-3][c+3]) {
                        return { player: b[r][c], slots: [[r,c], [r-1,c+1], [r-2,c+2], [r-3,c+3]] };
                    }
                }
            }
            for (let r = 0; r < ROWS - 3; r++) {
                for (let c = 0; c < COLS - 3; c++) {
                    if (b[r][c] !== EMPTY && b[r][c] === b[r+1][c+1] && b[r][c] === b[r+2][c+2] && b[r][c] === b[r+3][c+3]) {
                        return { player: b[r][c], slots: [[r,c], [r+1,c+1], [r+2,c+2], [r+3,c+3]] };
                    }
                }
            }
            return null;
        }

        function checkDraw(b) {
            for (let c = 0; c < COLS; c++) {
                if (b[0][c] === EMPTY) return false;
            }
            return true;
        }

        function highlightWinningLine(slots) {
            for (let [r, c] of slots) {
                const token = document.getElementById(`token-${r}-${c}`);
                if (token) token.classList.add('winning-token');
            }
        }

        function nextRound() {
            if (isAnimating) return;
            initBoard();
            document.querySelectorAll('.token').forEach(t => t.remove());
            statusEl.textContent = "Your Turn (Red)";
        }

        function resetFullGame() {
            if (isAnimating) return;
            playerScore = 0;
            aiScore = 0;
            document.getElementById('player-score').textContent = 0;
            document.getElementById('ai-score').textContent = 0;
            nextRound();
        }

        initBoard();
        createGridLayout();
    </script>
</body>
</html>
